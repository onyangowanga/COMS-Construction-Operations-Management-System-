<div style="
    padding: 1rem 1.5rem;
    background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
    color: white;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(67, 233, 123, 0.3);
    display: flex;
    align-items: center;
    gap: 1rem;
    animation: slideIn 0.3s ease-out;
">
    <div style="font-size: 2rem;">✅</div>
    <div style="flex: 1;">
        <div style="font-weight: 700; font-size: 1.1rem; margin-bottom: 0.25rem;">
            {{ message }}
        </div>
        <div style="font-size: 0.9rem; opacity: 0.9;">
            Forecast generated for {{ result.horizon_months }} months ahead
        </div>
    </div>
    <button 
        onclick="this.parentElement.style.display='none'"
        style="
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        ">
        ×
    </button>
</div>

<style>
@keyframes slideIn {
    from {
        transform: translateY(-20px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}
</style>

<script>
// Auto-hide after 5 seconds
setTimeout(() => {
    document.querySelector('#generate-result').innerHTML = '';
    // Trigger refresh of all HTMX sections
    htmx.trigger(document.body, 'refreshCashFlow');
}, 5000);
</script>
